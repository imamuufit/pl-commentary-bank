<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#183b3f">
  <title>PL Commentary Bank</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./src/styles.css">
  <link rel="stylesheet" href="./src/result-import-workspace.css">
</head>
<body>
  <header class="top no-print">
    <div>
      <p class="eyebrow">パワーリフティングYouTube解説資料</p>
      <h1>PL Commentary Bank</h1>
    </div>
    <div class="actions">
      <button id="printBtn">PDF印刷</button>
      <button id="jsonBtn">JSON保存</button>
      <button id="csvBtn">CSV保存</button>
      <label class="upload">JSON読込<input id="jsonInput" type="file" accept="application/json" hidden></label>
    </div>
  </header>
  <main class="shell">
    <aside class="side no-print">
      <section class="panel">
        <h2>大会検索</h2>
        <label for="eventSearch">どの大会について調べますか</label>
        <input id="eventSearch" type="search" placeholder="大会名・開催地・年">
        <button id="openEventBtn" type="button">大会出場者を表示</button>
        <button id="openHpaSearchBtn" type="button">HPA検索を開く</button>
        <p id="eventSearchHint" class="muted"></p>
        <h2>大会出場者</h2>
        <input id="search" type="search" placeholder="氏名・フリガナ・所属・階級">
        <ol id="playerList"></ol>
      </section>
      <section class="panel">
        <h2>選手名簿</h2>
        <div id="playerMasterRoster"></div>
      </section>
      <section class="panel">
        <h2>選手編集</h2>
        <form id="playerForm" class="form"></form>
      </section>
      <section class="panel">
        <h2>出場歴編集</h2>
        <form id="historyForm" class="form"></form>
      </section>
    </aside>
    <section class="preview">
      <div class="no-print lock">固定雛形：v5.9.6_LOCK。配置・余白・ヘッダー・出場歴カードは勝手に変更しない。</div>
      <div id="pages"></div>
    </section>
  </main>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
  <script type="module" src="./src/app.js"></script>
  <script src="./src/event-relative-history.js" defer></script>
  <script src="./src/event-search-helper.js" defer></script>
  <script src="./src/result-import-workspace.js" defer></script>
</body>
</html>
